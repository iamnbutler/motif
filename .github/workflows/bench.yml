name: Benchmark

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:

jobs:
  bench:
    name: Run benchmarks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run scene_build benchmark (Criterion)
        run: cargo bench --bench scene_build -- --noplot

      - name: Run quad_render benchmark
        run: cargo bench --bench quad_render 2>&1 | tee /tmp/quad_render_output.txt
        env:
          MOTIF_BENCH_JSON: "1"

      - name: Clone wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git /tmp/wiki

      - name: Collect and prepend benchmark results
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Collect results
          SCENE_BUILD_NS=""
          for est in target/criterion/*/new/estimates.json; do
            if [ -f "$est" ]; then
              SCENE_BUILD_NS=$(jq '.mean.point_estimate | floor' "$est")
            fi
          done

          QUAD_RENDER_FPS=""
          if grep -q '^{' /tmp/quad_render_output.txt; then
            QUAD_RENDER_FPS=$(grep '^{' /tmp/quad_render_output.txt | jq -r '.fps | . * 100 | floor | . / 100')
          fi

          # Build new row
          NEW_ROW="| $DATE | $SHORT_SHA | ${SCENE_BUILD_NS:-N/A} | ${QUAD_RENDER_FPS:-N/A} |"

          # Create or update wiki page
          WIKI_FILE="/tmp/wiki/Benchmarks.md"

          # Extract existing data rows (lines starting with "| 20")
          EXISTING_ROWS=$(grep "^| 20" "$WIKI_FILE" 2>/dev/null || true)

          # Write header + new row + existing rows
          {
            echo "# Benchmark Results"
            echo ""
            echo "| Date | Commit | scene_build (ns) | quad_render (fps) |"
            echo "|------|--------|------------------|-------------------|"
            echo "$NEW_ROW"
            if [ -n "$EXISTING_ROWS" ]; then
              echo "$EXISTING_ROWS"
            fi
          } > "$WIKI_FILE"

      - name: Push to wiki
        working-directory: /tmp/wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Benchmarks.md
          if git diff --staged --quiet; then
            echo "No changes to benchmark results"
          else
            git commit -m "Update benchmark results"
            git push
          fi
