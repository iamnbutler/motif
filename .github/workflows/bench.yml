name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bench:
    name: Run benchmarks
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run scene_build benchmark (Criterion)
        run: cargo bench --bench scene_build -- --noplot

      - name: Run quad_render benchmark
        run: cargo bench --bench quad_render 2>&1 | tee /tmp/quad_render_output.txt
        env:
          MOTIF_BENCH_JSON: "1"

      - name: Collect benchmark results
        run: |
          mkdir -p docs
          TIMESTAMP=$(date +%s)

          # Criterion results from scene_build
          for est in target/criterion/*/new/estimates.json; do
            if [ -f "$est" ]; then
              BENCH_NAME=$(echo "$est" | sed 's|target/criterion/\(.*\)/new/estimates.json|\1|')
              # Extract mean estimate (in nanoseconds)
              MEAN_NS=$(jq '.mean.point_estimate' "$est")
              echo "{\"timestamp\":\"$TIMESTAMP\",\"benchmark\":\"scene_build/$BENCH_NAME\",\"mean_ns\":$MEAN_NS}" >> docs/benches.jsonl
            fi
          done

          # quad_render results (already JSON)
          if grep -q '^{' /tmp/quad_render_output.txt; then
            grep '^{' /tmp/quad_render_output.txt >> docs/benches.jsonl
          fi

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/benches.jsonl
          if git diff --staged --quiet; then
            echo "No changes to benchmark results"
          else
            git commit -m "bench: update benchmark results [skip ci]"
            git push
          fi
